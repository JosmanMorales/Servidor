<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Robot Oruga Dashboard</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>

  <style>

    :root{
      --bg:#0f1117;
      --surface:#1a1d27;
      --card:#21253a;
      --border:#2e3354;
      --accent:#4f8cff;
      --success:#2dd36f;
      --danger:#ff4d6d;
      --text:#e8eaf6;
      --muted:#7b82a8;
      --mono:'Courier New', monospace;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Segoe UI',sans-serif;
      min-height:100vh;
    }

    header{
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:16px 24px;
      display:flex;
      align-items:center;
      gap:12px;
    }

    header h1 span{
      color:var(--accent);
    }

    .status-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--success);
      margin-left:auto;
    }

    main{
      padding:20px;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:16px;
      max-width:1400px;
      margin:auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:10px;
      padding:20px;
    }

    .metric{
      font-size:32px;
      font-weight:bold;
      margin-top:10px;
    }

    .cmd-panel{
      grid-column:span 2;
    }

    .cmd-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-top:20px;
    }

    .cmd-btn{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:10px;
      color:white;
      padding:15px;
      cursor:pointer;
      font-size:16px;
      transition:.2s;
      font-family:var(--mono);
    }

    .cmd-btn:hover{
      border-color:var(--accent);
      background:#2b3150;
    }

    .cmd-input-row{
      display:flex;
      gap:10px;
      margin-top:20px;
    }

    .cmd-input-row input{
      flex:1;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:8px;
      color:white;
      padding:10px;
    }

    .cmd-input-row button{
      background:var(--accent);
      border:none;
      color:white;
      border-radius:8px;
      padding:10px 20px;
      cursor:pointer;
    }

    #cmd-feedback{
      margin-top:10px;
      color:var(--success);
    }

    .sensor-row{
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid var(--border);
    }

    .log-panel{
      grid-column:span 3;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }

    th, td{
      padding:10px;
      border-bottom:1px solid var(--border);
      text-align:left;
      font-family:var(--mono);
      font-size:13px;
    }

    th{
      color:var(--muted);
      background:var(--surface);
    }

    @media(max-width:900px){

      main{
        grid-template-columns:1fr;
      }

      .cmd-panel,
      .log-panel{
        grid-column:span 1;
      }

      .cmd-grid{
        grid-template-columns:repeat(2,1fr);
      }

    }

  </style>

</head>

<body>

<header>

  <div style="font-size:28px">🤖</div>

  <h1>
    Robot <span>Oruga</span> Dashboard
  </h1>

  <span id="status-text">
    Conectando...
  </span>

  <div class="status-dot"></div>

</header>

<main>

  <div class="card">
    <div>Total Eventos</div>
    <div class="metric" id="met-total">0</div>
  </div>

  <div class="card">
    <div>Distancia</div>
    <div class="metric" id="met-dist">—</div>
  </div>

  <div class="card">
    <div>Comandos</div>
    <div class="metric" id="met-cmds">0</div>
  </div>

  <!-- PANEL COMANDOS -->

  <div class="card cmd-panel">

    <h2>Control Robot</h2>

    <div class="cmd-grid">

      <!-- MOVIMIENTO -->

      <button class="cmd-btn" onclick="sendCmd('F')">
        F<br>ADELANTE
      </button>

      <button class="cmd-btn" onclick="sendCmd('B')">
        B<br>ATRÁS
      </button>

      <button class="cmd-btn" onclick="sendCmd('S')">
        S<br>STOP
      </button>

      <button class="cmd-btn" onclick="sendCmd('L')">
        L<br>IZQUIERDA
      </button>

      <button class="cmd-btn" onclick="sendCmd('R')">
        R<br>DERECHA
      </button>

      <!-- SERVOS -->

      <button class="cmd-btn" onclick="sendCmd('a')">
        a<br>S1 -
      </button>

      <button class="cmd-btn" onclick="sendCmd('d')">
        d<br>S1 +
      </button>

      <button class="cmd-btn" onclick="sendCmd('w')">
        w<br>S2 -
      </button>

      <button class="cmd-btn" onclick="sendCmd('s')">
        s<br>S2 +
      </button>

      <button class="cmd-btn" onclick="sendCmd('q')">
        q<br>S3 -
      </button>

      <button class="cmd-btn" onclick="sendCmd('e')">
        e<br>S3 +
      </button>

      <button class="cmd-btn" onclick="sendCmd('z')">
        z<br>S4 -
      </button>

      <button class="cmd-btn" onclick="sendCmd('x')">
        x<br>S4 +
      </button>

      <button class="cmd-btn" onclick="sendCmd('o')">
        o<br>S5 -
      </button>

      <button class="cmd-btn" onclick="sendCmd('c')">
        c<br>S5 +
      </button>

    </div>

    <div class="cmd-input-row">

      <input
        type="text"
        id="cmd-custom"
        maxlength="1"
        placeholder="Comando personalizado"
      >

      <button onclick="sendCustomCmd()">
        Enviar
      </button>

    </div>

    <div id="cmd-feedback"></div>

  </div>

  <!-- SENSORES -->

  <div class="card">

    <h2>Sensores</h2>

    <div class="sensor-row">
      <span>Humedad</span>
      <span id="s-hum">—</span>
    </div>

    <div class="sensor-row">
      <span>Distancia</span>
      <span id="s-dist">—</span>
    </div>

    <div class="sensor-row">
      <span>Modo</span>
      <span id="s-mode">—</span>
    </div>

    <div class="sensor-row">
      <span>Última Acción</span>
      <span id="s-action">—</span>
    </div>

  </div>

  <!-- LOGS -->

  <div class="card log-panel">

    <h2>Eventos en Tiempo Real</h2>

    <table>

      <thead>

        <tr>
          <th>Hora</th>
          <th>Origen</th>
          <th>Acción</th>
          <th>Distancia</th>
          <th>Humedad</th>
          <th>Modo</th>
        </tr>

      </thead>

      <tbody id="log-body"></tbody>

    </table>

  </div>

</main>

<script>

  // ==========================
  // SOCKET.IO
  // ==========================

  const socket = io();

  socket.on('connect', () => {

    document.getElementById('status-text').innerText =
      'Conectado en tiempo real';

    loadInitialData();

  });

  socket.on('disconnect', () => {

    document.getElementById('status-text').innerText =
      'Desconectado';

  });

  // ==========================
  // NUEVOS EVENTOS
  // ==========================

  socket.on('nuevo_evento', (ev) => {

    console.log('Nuevo evento:', ev);

    addLog(ev);

    updateSensors(ev);

  });

  // ==========================
  // CARGA INICIAL
  // ==========================

  async function loadInitialData(){

    try{

      // EVENTOS

      const resEvents =
        await fetch('/api/eventos?limit=50');

      const events =
        await resEvents.json();

      document.getElementById('met-total').innerText =
        events.length;

      events.reverse().forEach(ev => {
        addLog(ev);
      });

      // STATS

      const resStats =
        await fetch('/api/stats');

      const stats =
        await resStats.json();

      document.getElementById('met-cmds').innerText =
        stats.comandosPendientes || 0;

      if(stats.ultima){
        updateSensors(stats.ultima);
      }

    }catch(error){

      console.error(error);

    }

  }

  // ==========================
  // ACTUALIZAR SENSORES
  // ==========================

  function updateSensors(ev){

    if(ev.distancia !== undefined){

      document.getElementById('met-dist').innerText =
        ev.distancia + ' cm';

      document.getElementById('s-dist').innerText =
        ev.distancia + ' cm';

    }

    if(ev.humedad !== undefined){

      document.getElementById('s-hum').innerText =
        ev.humedad + ' %';

    }

    if(ev.modo){

      document.getElementById('s-mode').innerText =
        ev.modo;

    }

    if(ev.accion){

      document.getElementById('s-action').innerText =
        ev.accion;

    }

  }

  // ==========================
  // AGREGAR LOG
  // ==========================

  function addLog(ev){

    const tbody =
      document.getElementById('log-body');

    const tr =
      document.createElement('tr');

    const hora =
      new Date(ev.timestamp || Date.now())
      .toLocaleTimeString();

    tr.innerHTML = `
      <td>${hora}</td>
      <td>${ev.origen || '-'}</td>
      <td>${ev.accion || '-'}</td>
      <td>${ev.distancia ?? '-'}</td>
      <td>${ev.humedad ?? '-'}</td>
      <td>${ev.modo || '-'}</td>
    `;

    tbody.prepend(tr);

  }

  // ==========================
  // ENVIAR COMANDO
  // ==========================

  async function sendCmd(cmd){

    try{

      const response =
        await fetch('/api/enviar-comando', {

          method:'POST',

          headers:{
            'Content-Type':'application/json'
          },

          body:JSON.stringify({
            comando:cmd
          })

        });

      const data =
        await response.json();

      console.log(data);

      document.getElementById('cmd-feedback').innerText =
        'Comando enviado: ' + cmd;

      let total =
        parseInt(
          document.getElementById('met-cmds').innerText
        );

      document.getElementById('met-cmds').innerText =
        total + 1;

    }catch(error){

      console.error(error);

      document.getElementById('cmd-feedback').innerText =
        'Error enviando comando';

    }

  }

  // ==========================
  // COMANDO PERSONALIZADO
  // ==========================

  function sendCustomCmd(){

    const input =
      document.getElementById('cmd-custom');

    const cmd =
      input.value.trim();

    if(!cmd) return;

    sendCmd(cmd);

    input.value = '';

  }

</script>

</body>
</html>
